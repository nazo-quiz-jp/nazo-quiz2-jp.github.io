<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ — なぞとき広場</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Zen Maru Gothic',sans-serif;background:#f8fafe;color:#141828;line-height:1.9;padding-bottom:60px;}
  .site-header{background:#3a78d8;padding:0 20px;display:flex;align-items:center;height:52px;}
  .site-logo{font-size:1.1em;font-weight:700;color:#fff;}
  .site-sub{font-size:.75em;color:rgba(255,255,255,.7);margin-left:10px;}
  .container{max-width:720px;margin:0 auto;padding:32px 16px;}
  h1{font-size:1.5em;font-weight:700;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #dde8f8;}
  .lead{font-size:.95em;color:#607090;margin-bottom:28px;line-height:1.9;}
  .form-group{margin-bottom:20px;}
  label{display:block;font-size:.88em;font-weight:700;color:#3a78d8;margin-bottom:6px;}
  input,textarea{width:100%;padding:12px 14px;border:1px solid #dde8f8;border-radius:10px;font-family:'Zen Maru Gothic',sans-serif;font-size:.95em;color:#141828;background:#fff;outline:none;transition:border .18s;}
  input:focus,textarea:focus{border-color:#3a78d8;}
  textarea{height:160px;resize:vertical;}
  .submit-btn{background:#3a78d8;color:#fff;border:none;border-radius:20px;padding:12px 32px;font-size:.95em;font-weight:700;font-family:'Zen Maru Gothic',sans-serif;cursor:pointer;transition:background .18s;margin-top:8px;}
  .submit-btn:hover{background:#6098f0;}
  .note{font-size:.82em;color:#607090;margin-top:24px;line-height:1.8;}
  .back{display:inline-block;margin-top:32px;background:#fff;border:1px solid #dde8f8;color:#3a78d8;padding:10px 24px;border-radius:20px;text-decoration:none;font-weight:700;font-size:.9em;}
  .thanks{display:none;background:#edf5ff;border:1px solid #dde8f8;border-radius:12px;padding:20px;text-align:center;margin-top:20px;}
  .thanks.show{display:block;}
</style>
</head>
<body>
<header class="site-header">
  <div class="site-logo">なぞとき広場</div>
  <div class="site-sub">頭をやわらかく！</div>
</header>
<div class="container">
  <h1>お問い合わせ</h1>
  <p class="lead">サイトに関するご意見・ご要望・不具合報告などはこちらからお送りください。<br>内容を確認の上、順次対応いたします。</p>

  <form id="contactForm" action="https://formspree.io/f/mnjwzbev" method="POST" onsubmit="showThanks(event)">
    <div class="form-group">
      <label for="name">お名前</label>
      <input type="text" id="name" name="name" placeholder="例：田中 太郎" required>
    </div>
    <div class="form-group">
      <label for="email">メールアドレス</label>
      <input type="email" id="email" name="email" placeholder="例：example@email.com" required>
    </div>
    <div class="form-group">
      <label for="subject">件名</label>
      <input type="text" id="subject" name="subject" placeholder="例：クイズの答えについて">
    </div>
    <div class="form-group">
      <label for="message">お問い合わせ内容</label>
      <textarea id="message" name="message" placeholder="お問い合わせ内容をご記入ください。" required></textarea>
    </div>
    <button type="submit" class="submit-btn">送信する</button>
  </form>

  <div class="thanks" id="thanksMsg">
    ありがとうございました！お問い合わせを受け付けました。順次ご返答いたします。
  </div>

  <p class="note">
    ※ いただいた個人情報はお問い合わせへの返答のみに使用し、第三者への提供は行いません。<br>
    ※ 返答まで数日かかる場合があります。あらかじめご了承ください。
  </p>

  <a href="index.html" class="back">← トップページへ戻る</a>
</div>
<script>
function showThanks(e){
  e.preventDefault();
  document.getElementById('contactForm').style.display='none';
  document.getElementById('thanksMsg').classList.add('show');
}
</script>
</body>
</html>
